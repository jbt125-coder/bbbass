    .header { margin: 10px; text-transform: uppercase; letter-spacing: 3px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

    /* Vocal Slider Section */
    .vocal-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 90%; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
    .slider-box { display: flex; flex-direction: column; align-items: center; font-size: 10px; }
    input[type=range].vert { writing-mode: bt-lr; appearance: slider-vertical; width: 30px; height: 100px; margin: 10px 0; }

    /* Mic Toggle */
    .mic-toggle-row { width: 90%; display: flex; justify-content: flex-end; margin-bottom: 6px; }
    .mic-btn {
        background: #1a1a1e;
        border: 2px solid #00f2ff;
        color: #00f2ff;
        font-family: 'Courier New', monospace;
        font-size: 11px;
        font-weight: bold;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        letter-spacing: 1px;
        transition: background 0.2s, color 0.2s;
    }
    .mic-btn.off {
        border-color: #ff3860;
        color: #ff3860;
    }
    .mic-btn.off::before { content: '🎙 MIC OFF'; }
    .mic-btn.on::before { content: '🎙 MIC ON'; }

    /* Drum Pad Section */
    .drum-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 90%; margin-bottom: 10px; }
    .pad { height: 70px; background: var(--pad); border: 2px solid #333; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; transition: 0.1s; cursor: pointer; user-select: none; }
    .pad:active, .pad.active { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); transform: scale(0.95); }
    .pad span { font-size: 9px; opacity: 0.7; margin-top: 4px; }

    /* ===== LOOPER SECTION ===== */
    .looper-section {
        width: 90%;
        background: #0e0e12;
        border: 1px solid #2a2a3a;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 12px;
    }
    .looper-title {
        font-size: 10px;
        letter-spacing: 2px;
        color: var(--neon);
        text-transform: uppercase;
        margin-bottom: 10px;
        text-align: center;
    }
    .looper-channels { display: flex; flex-direction: column; gap: 8px; }
    .looper-channel {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #151518;
        border-radius: 8px;
        padding: 8px 10px;
        border: 1px solid #222;
    }
    .ch-label {
        font-size: 10px;
        color: #888;
        min-width: 24px;
        letter-spacing: 1px;
    }
    .ch-length {
        background: #1a1a1e;
        border: 1px solid #333;
        color: white;
        font-family: 'Courier New', monospace;
        font-size: 10px;
        padding: 4px 6px;
        border-radius: 4px;
        cursor: pointer;
    }
    .ch-btns { display: flex; gap: 5px; flex: 1; justify-content: flex-end; }
    .loop-btn {
        font-family: 'Courier New', monospace;
        font-size: 10px;
        font-weight: bold;
        padding: 5px 10px;
        border-radius: 5px;
        border: 2px solid;
        cursor: pointer;
        letter-spacing: 1px;
        transition: all 0.15s;
        background: transparent;
    }
    .loop-btn.rec  { border-color: #ff3860; color: #ff3860; }
    .loop-btn.rec.active  { background: #ff3860; color: black; box-shadow: 0 0 12px #ff3860; }
    .loop-btn.play { border-color: #00f2ff; color: #00f2ff; }
    .loop-btn.play.active { background: #00f2ff; color: black; box-shadow: 0 0 12px #00f2ff; }
    .loop-btn.stop { border-color: #888; color: #888; }
    .loop-btn.stop:active { background: #888; color: black; }

    .ch-progress {
        width: 100%;
        height: 3px;
        background: #222;
        border-radius: 2px;
        margin-top: 6px;
        overflow: hidden;
    }
    .ch-progress-bar {
        height: 100%;
        width: 0%;
        border-radius: 2px;
        transition: none;
    }
    .ch1 .ch-progress-bar { background: #ff3860; }
    .ch2 .ch-progress-bar { background: #00f2ff; }

    /* ===== BOTTOM SECTION with Otomatone ===== */
    .bottom-section { display: flex; width: 90%; justify-content: space-around; align-items: flex-end; padding-bottom: 10px; margin-top: 6px; }
    
    .otomatone-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .otomatone-label { font-size: 9px; letter-spacing: 2px; color: #888; text-transform: uppercase; }

        width: 50px; height: 50px;
        background: var(--neon);
        border-radius: 50%;
        position: absolute;
        top: 45px; left: 45px;

        transition: box-shadow 0.1s;

<script>
    let ctx, micStream, micIn, micGateGain, vocalGain, echoNode, echoFeedback, verbNode, pitchNode;
    let bassOsc, bassFilter, bassGain;
    let isInitialized = false;
    let micEnabled = true;

    // Looper state per channel
    const looper = {
        1: { state: 'idle', mediaRecorder: null, chunks: [], buffer: null, sourceNode: null, startTime: 0, rafId: null },
        2: { state: 'idle', mediaRecorder: null, chunks: [], buffer: null, sourceNode: null, startTime: 0, rafId: null }
    };

    // We need a destination stream for the looper to record from
    let looperDestination = null;

    async function initAudio() {
        if (isInitialized) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();

        // 1. MIC SETUP
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micIn = ctx.createMediaStreamSource(stream);

        // Mic gate (for MIC ON/OFF)
        micGateGain = ctx.createGain();
        micGateGain.gain.value = 1;

        // --- MIC PROCESSING CHAIN ---
        vocalGain = ctx.createGain();
        pitchNode = createPitchShifter(ctx);

        echoNode = ctx.createDelay(2.0);
        echoFeedback = ctx.createGain();
        echoNode.connect(echoFeedback);
        echoFeedback.connect(echoNode);

        verbNode = ctx.createConvolver();
        verbNode.buffer = createReverbBuffer(ctx, 2.0, 2.0);
        const verbGain = ctx.createGain();
        verbGain.gain.value = 0;
        window._verbGain = verbGain; // expose for slider

        // Route: Mic -> Gate -> Pitch -> Volume -> (Split to Echo/Verb) -> Out
        micIn.connect(micGateGain);
        micGateGain.connect(pitchNode.input);
        pitchNode.output.connect(vocalGain);

        vocalGain.connect(ctx.destination);
        vocalGain.connect(echoNode);
        echoNode.connect(ctx.destination);
        vocalGain.connect(verbNode);
        verbNode.connect(verbGain);
        verbGain.connect(ctx.destination);

        // 2. BASS SETUP
        bassOsc = ctx.createOscillator();
        bassOsc.type = 'sawtooth';
        bassFilter = ctx.createBiquadFilter();
        bassGain = ctx.createGain();
        bassGain.gain.value = 0;
        bassOsc.connect(bassFilter);
        bassFilter.connect(bassGain);
        bassGain.connect(ctx.destination);
        bassOsc.start();

        // 3. LOOPER DESTINATION — capture everything going to output
        looperDestination = ctx.createMediaStreamDestination();
        vocalGain.connect(looperDestination);
        echoNode.connect(looperDestination);
        verbGain.connect(looperDestination);
        bassGain.connect(looperDestination);

        setupControls();
        document.getElementById('startBtn').style.display = 'none';
        isInitialized = true;
    }

    function toggleMic() {
        micEnabled = !micEnabled;
        const btn = document.getElementById('micToggle');
        if (micGateGain) micGateGain.gain.value = micEnabled ? 1 : 0;
        btn.className = 'mic-btn ' + (micEnabled ? 'on' : 'off');
    }

    function setupControls() {
        setInterval(() => {
            vocalGain.gain.setTargetAtTime(document.getElementById('v_vol').value, ctx.currentTime, 0.05);
            pitchNode.setPitch(document.getElementById('v_pitch').value);
            echoFeedback.gain.setTargetAtTime(document.getElementById('v_echo').value, ctx.currentTime, 0.05);
            echoNode.delayTime.setTargetAtTime(0.3, ctx.currentTime, 0.05);
            if (window._verbGain) {
                window._verbGain.gain.setTargetAtTime(document.getElementById('v_verb').value, ctx.currentTime, 0.05);
            }
        }, 50);
    }

    // --- DRUM SYNTHESIS ---
    function playDrum(type) {
        if (!ctx) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        const noise = ctx.createBufferSource();

        if (type === 'kick') {
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.5);
            g.gain.setValueAtTime(1, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.connect(g);
            g.connect(ctx.destination);
            if (looperDestination) g.connect(looperDestination);
            osc.start(); osc.stop(now + 0.5);
            osc.onended = () => { g.disconnect(); };
        } else if (type === 'snare' || type === 'clap') {
            const bufferSize = ctx.sampleRate * 0.2;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const filter = ctx.createBiquadFilter();
            filter.type = type === 'snare' ? 'bandpass' : 'highpass';
            filter.frequency.value = type === 'snare' ? 1000 : 1500;
            g.gain.setValueAtTime(type === 'clap' ? 0.7 : 1, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + (type === 'clap' ? 0.3 : 0.2));
            noise.connect(filter);
            filter.connect(g);
            g.connect(ctx.destination);
            if (looperDestination) g.connect(looperDestination);
            noise.start();
            noise.onended = () => { g.disconnect(); filter.disconnect(); };
        } else if (type === 'hat') {
            const bufferSize = ctx.sampleRate * 0.05;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const filter = ctx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 7000;
            g.gain.setValueAtTime(0.3, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            noise.connect(filter);
            filter.connect(g);
            g.connect(ctx.destination);
            if (looperDestination) g.connect(looperDestination);
            noise.start();
            noise.onended = () => { g.disconnect(); filter.disconnect(); };
        }
    }

    // ===== LOOPER LOGIC =====

    function loopRec(ch) {
        if (!isInitialized) return;
        const lp = looper[ch];

        // Stop any existing recording first
        if (lp.state === 'recording') { loopStop(ch); return; }

        // Stop playback if playing
        if (lp.state === 'playing') loopStop(ch);

        lp.chunks = [];
        lp.state = 'recording';

        const mr = new MediaRecorder(looperDestination.stream);
        lp.mediaRecorder = mr;

        mr.ondataavailable = e => { if (e.data.size > 0) lp.chunks.push(e.data); };
        mr.onstop = () => {
            const blob = new Blob(lp.chunks, { type: 'audio/webm' });
            lp.buffer = URL.createObjectURL(blob);
            lp.state = 'recorded';
            updateLoopUI(ch);
            cancelAnimationFrame(lp.rafId);
            document.getElementById(`ch${ch}-bar`).style.width = '0%';
            loopPlay(ch);
        };

        const lengthMs = parseInt(document.getElementById(`ch${ch}-length`).value) * 1000;
        mr.start();
        lp.startTime = performance.now();

        lp.recTimeout = setTimeout(() => {
            if (lp.state === 'recording') mr.stop();
        }, lengthMs);

        updateLoopUI(ch);
        animateProgress(ch, lengthMs);
    }

    function loopPlay(ch) {
        if (!isInitialized) return;
        const lp = looper[ch];
        if (!lp.buffer) return;
        if (lp.state === 'playing') return;

        lp.state = 'playing';
        updateLoopUI(ch);

        const lengthSec = parseInt(document.getElementById(`ch${ch}-length`).value);
        playLoopBuffer(ch, lengthSec);
    }

    function playLoopBuffer(ch, lengthSec) {
        const lp = looper[ch];
        if (lp.state !== 'playing') return;

        const audio = new Audio(lp.buffer);
        audio.onended = () => {
            if (lp.state === 'playing') playLoopBuffer(ch, lengthSec);
        };
        audio.play();
        lp._audio = audio;

        lp.startTime = performance.now();
        animateProgress(ch, lengthSec * 1000);
    }

    function loopStop(ch) {
        const lp = looper[ch];
        clearTimeout(lp.recTimeout);
        cancelAnimationFrame(lp.rafId);

        if (lp.mediaRecorder && lp.mediaRecorder.state !== 'inactive') {
            lp.mediaRecorder.stop();
        }
        if (lp._audio) {
            lp._audio.onended = null;
            lp._audio.pause();
            lp._audio = null;
        }

        lp.state = lp.buffer ? 'recorded' : 'idle';
        updateLoopUI(ch);
        document.getElementById(`ch${ch}-bar`).style.width = '0%';
    }

    function animateProgress(ch, durationMs) {
        const lp = looper[ch];
        const bar = document.getElementById(`ch${ch}-bar`);
        const start = performance.now();

        function tick(now) {
            const elapsed = now - start;
            const pct = Math.min((elapsed / durationMs) * 100, 100);
            bar.style.width = pct + '%';
            if (pct < 100 && (lp.state === 'recording' || lp.state === 'playing')) {
                lp.rafId = requestAnimationFrame(tick);
            }
        }
        lp.rafId = requestAnimationFrame(tick);
    }

    function updateLoopUI(ch) {
        const lp = looper[ch];
        const rec  = document.getElementById(`ch${ch}-rec`);
        const play = document.getElementById(`ch${ch}-play`);

        rec.classList.toggle('active', lp.state === 'recording');
        play.classList.toggle('active', lp.state === 'playing');
    }

    // --- UTILS: PITCH SHIFTER & REVERB ---
    function createPitchShifter(context) {
        const input = context.createGain();
        const output = context.createGain();
        const delay = context.createDelay();
        const lfo = context.createOscillator();
        const lfoGain = context.createGain();
        
        lfo.type = 'sawtooth';
        lfo.frequency.value = 10;
        lfoGain.gain.value = 0;

        lfo.connect(lfoGain);
        lfoGain.connect(delay.delayTime);
        input.connect(delay);
        delay.connect(output);
        lfo.start();

        return {
            input, output,
            setPitch: (semi) => {
                lfoGain.gain.setTargetAtTime(semi * 0.005, context.currentTime, 0.1);
            }
        };
    }

    function createReverbBuffer(context, duration, decay) {
        const sampleRate = context.sampleRate;
        const length = sampleRate * duration;
        const buffer = context.createBuffer(2, length, sampleRate);
        for (let channel = 0; channel < 2; channel++) {
            const data = buffer.getChannelData(channel);
            for (let i = 0; i < length; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
            }
        }
        return buffer;
    }

    // --- OTOMATONE JOYSTICK LOGIC ---
    const joy = document.getElementById('joy_container');
    const stick = document.getElementById('stick');

    function hsvToHex(h, s, v) {
        h = h % 360;
        const c = v * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = v - c;
        let r = 0, g = 0, b = 0;
        if (h < 60)       { r = c; g = x; b = 0; }
        else if (h < 120) { r = x; g = c; b = 0; }
        else if (h < 180) { r = 0; g = c; b = x; }
        else if (h < 240) { r = 0; g = x; b = c; }
        else if (h < 300) { r = x; g = 0; b = c; }
        else              { r = c; g = 0; b = x; }
        const toHex = n => Math.round((n + m) * 255).toString(16).padStart(2, '0');
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function updateStickColor(x, y) {
        // x: -1 to 1 → hue 0 to 360
        // y: -1 to 1 → brightness 0.5 to 1.0
        const hue = (x + 1) / 2 * 360;
        const brightness = 0.5 + (1 - (y + 1) / 2) * 0.5;
        const color = hsvToHex(hue, 1.0, brightness);
        stick.style.background = color;
        stick.style.boxShadow = `0 0 15px ${color}, 0 0 30px ${color}`;
    }

    function handleJoyMove(clientX, clientY) {
        const rect = joy.getBoundingClientRect();
        let x = (clientX - rect.left - rect.width / 2) / (rect.width / 2);
        let y = (clientY - rect.top - rect.height / 2) / (rect.height / 2);
        x = Math.max(-1, Math.min(1, x));
        y = Math.max(-1, Math.min(1, y));

        stick.style.transform = `translate(${x * 40}px, ${y * 40}px)`;
        updateStickColor(x, y);

        if (isInitialized) {
            bassOsc.frequency.setTargetAtTime(40 + (x + 1) * 60, ctx.currentTime, 0.05);
            bassFilter.frequency.setTargetAtTime(200 + (1 - y) * 2000, ctx.currentTime, 0.05);
            bassGain.gain.setTargetAtTime(document.getElementById('bass_vol').value, ctx.currentTime, 0.05);
        }
    }

    function handleJoyEnd() {
        stick.style.transform = `translate(0,0)`;
        stick.style.background = 'var(--neon)';
        stick.style.boxShadow = '0 0 15px var(--neon), 0 0 30px var(--neon)';
        if (isInitialized) bassGain.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
    }

    // Touch — must preventDefault on touchstart to claim the gesture from the browser
    joy.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        handleJoyMove(touch.clientX, touch.clientY);
    }, { passive: false });

    joy.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        handleJoyMove(touch.clientX, touch.clientY);
    }, { passive: false });

    joy.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleJoyEnd();
    }, { passive: false });

    joy.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        handleJoyEnd();
    }, { passive: false });

    // Mouse
    let mouseDown = false;
    joy.addEventListener('mousedown', () => { mouseDown = true; });
    window.addEventListener('mousemove', (e) => { if (mouseDown) handleJoyMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup', () => { if (mouseDown) { mouseDown = false; handleJoyEnd(); } });
</script>

</body>
</html>
