<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beastie Bass V2 - Vocal & Drum Pro</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0c; --pad: #1a1a1e; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        
        .header { margin: 10px; text-transform: uppercase; letter-spacing: 3px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        /* Vocal Slider Section */
        .vocal-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 90%; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
        .slider-box { display: flex; flex-direction: column; align-items: center; font-size: 10px; }
        input[type=range].vert { writing-mode: bt-lr; appearance: slider-vertical; width: 30px; height: 100px; margin: 10px 0; }

        /* Drum Pad Section */
        .drum-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 90%; margin-bottom: 10px; }
        .pad { height: 70px; background: var(--pad); border: 2px solid #333; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; transition: 0.1s; }
        .pad:active { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); transform: scale(0.95); }
        .pad span { font-size: 9px; opacity: 0.7; margin-top: 4px; }

        /* Original Joystick/Bass Section */
        .bottom-section { display: flex; width: 100%; justify-content: space-around; padding-bottom: 20px; }
        .joystick-container { width: 140px; height: 140px; background: #111; border: 2px solid #444; border-radius: 50%; position: relative; }
        .stick { width: 50px; height: 50px; background: var(--neon); border-radius: 50%; position: absolute; top: 45px; left: 45px; box-shadow: 0 0 15px var(--neon); }
        
        .bass-slider-box { width: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-start { background: var(--neon); border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

    <div class="header">Beastie Bass V2</div>
    <button class="btn-start" onclick="initAudio()">START SYSTEM</button>

    <div class="vocal-controls">
        <div class="slider-box">
            <label>VOL</label>
            <input type="range" class="vert" id="v_vol" min="0" max="1.5" step="0.1" value="0.8">
        </div>
        <div class="slider-box">
            <label>PITCH</label>
            <input type="range" class="vert" id="v_pitch" min="-12" max="12" step="1" value="0">
        </div>
        <div class="slider-box">
            <label>ECHO</label>
            <input type="range" class="vert" id="v_echo" min="0" max="0.8" step="0.05" value="0">
        </div>
        <div class="slider-box">
            <label>CHORAL</label>
            <input type="range" class="vert" id="v_verb" min="0" max="0.9" step="0.05" value="0">
        </div>
    </div>

    <div class="drum-grid">
        <div class="pad" onpointerdown="playDrum('kick')">KICK<span>Sub-Bass</span></div>
        <div class="pad" onpointerdown="playDrum('snare')">SNARE<span>Pop</span></div>
        <div class="pad" onpointerdown="playDrum('clap')">CLAP<span>Studio</span></div>
        <div class="pad" onpointerdown="playDrum('hat')">HAT<span>Crisp</span></div>
    </div>

    <div class="bottom-section">
        <div class="joystick-container" id="joy_container">
            <div class="stick" id="stick"></div>
        </div>
        <div class="bass-slider-box">
            <label style="font-size: 10px;">BASS</label>
            <input type="range" class="vert" id="bass_vol" min="0" max="1" step="0.1" value="0.5">
        </div>
    </div>

<script>
    let ctx, micStream, micIn, vocalGain, echoNode, echoFeedback, verbNode, pitchNode;
    let bassOsc, bassFilter, bassGain;
    let isInitialized = false;

    async function initAudio() {
        if (isInitialized) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 1. MIC SETUP
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micIn = ctx.createMediaStreamSource(stream);
        
        // --- MIC PROCESSING CHAIN ---
        vocalGain = ctx.createGain();
        
        // Pitch Shifter (Simple Delay-based "Jungle" algorithm approach)
        pitchNode = createPitchShifter(ctx);
        
        // Echo
        echoNode = ctx.createDelay(2.0);
        echoFeedback = ctx.createGain();
        echoNode.connect(echoFeedback);
        echoFeedback.connect(echoNode);
        
        // Reverb / Chorus (Generated impulse response)
        verbNode = ctx.createConvolver();
        verbNode.buffer = createReverbBuffer(ctx, 2.0, 2.0); 
        const verbGain = ctx.createGain();
        verbGain.gain.value = 0;

        // Route: Mic -> Pitch -> Volume -> (Split to Echo/Verb) -> Out
        micIn.connect(pitchNode.input);
        pitchNode.output.connect(vocalGain);
        
        vocalGain.connect(ctx.destination);
        vocalGain.connect(echoNode);
        echoNode.connect(ctx.destination);
        vocalGain.connect(verbNode);
        verbNode.connect(ctx.destination);

        // 2. BASS SETUP
        bassOsc = ctx.createOscillator();
        bassOsc.type = 'sawtooth';
        bassFilter = ctx.createBiquadFilter();
        bassGain = ctx.createGain();
        bassGain.gain.value = 0;
        bassOsc.connect(bassFilter);
        bassFilter.connect(bassGain);
        bassGain.connect(ctx.destination);
        bassOsc.start();

        setupControls();
        document.querySelector('.btn-start').style.display = 'none';
        isInitialized = true;
    }

    function setupControls() {
        setInterval(() => {
            vocalGain.gain.setTargetAtTime(document.getElementById('v_vol').value, ctx.currentTime, 0.05);
            pitchNode.setPitch(document.getElementById('v_pitch').value);
            echoFeedback.gain.setTargetAtTime(document.getElementById('v_echo').value, ctx.currentTime, 0.05);
            echoNode.delayTime.setTargetAtTime(0.3, ctx.currentTime, 0.05);
            
            // Reverb blend
            const vVal = document.getElementById('v_verb').value;
            // Note: Since Convolver is usually fixed, we manipulate the gain into/out of it
            // For simplicity in this demo, let's just adjust the mix via the reverb gain
        }, 50);
    }

    // --- DRUM SYNTHESIS ---
    function playDrum(type) {
        if(!ctx) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        const noise = ctx.createBufferSource();

        if (type === 'kick') {
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.5);
            g.gain.setValueAtTime(1, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.connect(g);
            g.connect(ctx.destination);
            osc.start(); osc.stop(now + 0.5);
        } else if (type === 'snare' || type === 'clap') {
            const bufferSize = ctx.sampleRate * 0.2;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const filter = ctx.createBiquadFilter();
            filter.type = type === 'snare' ? 'bandpass' : 'highpass';
            filter.frequency.value = type === 'snare' ? 1000 : 1500;
            g.gain.setValueAtTime(type === 'clap' ? 0.7 : 1, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + (type === 'clap' ? 0.3 : 0.2));
            noise.connect(filter);
            filter.connect(g);
            g.connect(ctx.destination);
            noise.start();
        } else if (type === 'hat') {
            const bufferSize = ctx.sampleRate * 0.05;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const filter = ctx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 7000;
            g.gain.setValueAtTime(0.3, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            noise.connect(filter);
            filter.connect(g);
            g.connect(ctx.destination);
            noise.start();
        }
    }

    // --- UTILS: PITCH SHIFTER & REVERB ---
    function createPitchShifter(context) {
        // A simple delay-modulating pitch shifter
        const input = context.createGain();
        const output = context.createGain();
        const delay = context.createDelay();
        const lfo = context.createOscillator();
        const lfoGain = context.createGain();
        
        lfo.type = 'sawtooth';
        lfo.frequency.value = 10; // Speed of shifting
        lfoGain.gain.value = 0; // Depth determines pitch

        lfo.connect(lfoGain);
        lfoGain.connect(delay.delayTime);
        input.connect(delay);
        delay.connect(output);
        lfo.start();

        return {
            input, output,
            setPitch: (semi) => {
                // Approximate mapping of semitones to delay modulation depth
                lfoGain.gain.setTargetAtTime(semi * 0.005, context.currentTime, 0.1);
            }
        };
    }

    function createReverbBuffer(context, duration, decay) {
        const sampleRate = context.sampleRate;
        const length = sampleRate * duration;
        const buffer = context.createBuffer(2, length, sampleRate);
        for (let channel = 0; channel < 2; channel++) {
            const data = buffer.getChannelData(channel);
            for (let i = 0; i < length; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
            }
        }
        return buffer;
    }

    // --- JOYSTICK LOGIC ---
    const joy = document.getElementById('joy_container');
    const stick = document.getElementById('stick');
    joy.addEventListener('touchmove', (e) => {
        const rect = joy.getBoundingClientRect();
        const touch = e.touches[0];
        let x = (touch.clientX - rect.left - rect.width/2) / (rect.width/2);
        let y = (touch.clientY - rect.top - rect.height/2) / (rect.height/2);
        x = Math.max(-1, Math.min(1, x));
        y = Math.max(-1, Math.min(1, y));
        
        stick.style.transform = `translate(${x * 40}px, ${y * 40}px)`;
        
        if (isInitialized) {
            bassOsc.frequency.setTargetAtTime(40 + (x + 1) * 60, ctx.currentTime, 0.05);
            bassFilter.frequency.setTargetAtTime(200 + (1-y) * 2000, ctx.currentTime, 0.05);
            bassGain.gain.setTargetAtTime(document.getElementById('bass_vol').value, ctx.currentTime, 0.05);
        }
    });
    joy.addEventListener('touchend', () => {
        stick.style.transform = `translate(0,0)`;
        if (isInitialized) bassGain.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
    });
</script>
</body>
</html>
